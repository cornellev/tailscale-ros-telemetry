services:
  tailscale:
    build:
      context: .
      dockerfile: Dockerfile.tailscale
    container_name: ts-authkey-container
    hostname: ros-tailscale-service
    environment:
      - TS_CLIENT_ID=${TS_CLIENT_ID:-}
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--advertise-tags=tag:ros-device --ssh=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
    volumes:
      - ts-authkey-container:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun

    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/healthz"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile.ros
    entrypoint: ["/entrypoint-discovery.sh"]
    container_name: ros-discovery-server
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped

  rosbag:
    build:
      context: .
      dockerfile: Dockerfile.ros
    entrypoint: ["/entrypoint-rosbag.sh"]
    depends_on:
      ros:
        condition: service_started
    volumes:
      - ./bags:/workspace/bags
      - /dev/shm:/dev/shm # share host shm so FastDDS shared memory transport works with ros
    network_mode: service:tailscale
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-14}
      - ROS_DISCOVERY_SERVER=127.0.0.1:11811

  ros:
    build:
      context: .
      dockerfile: Dockerfile.ros
    devices:
      - ${GPIO_DEVICE:-/dev/gpiomem}:${GPIO_DEVICE:-/dev/gpiomem}
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
      discovery-server:
        condition: service_started
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-14}
      - ROS_DISCOVERY_SERVER=127.0.0.1:11811
    volumes:
      - .:/workspace
      - /dev/shm:/dev/shm # bind host POSIX shm into the container
    working_dir: /workspace

volumes:
  ts-authkey-container:
    driver: local
